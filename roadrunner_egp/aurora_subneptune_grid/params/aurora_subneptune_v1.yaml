model_name: aurora_subneptune_v1

author: "Daniel Huang"
contact: "Daniel Huang"
project: "Aurora Sub-Neptune Grid"
notes: >-
  Supported production grid: 40,000 PICASO gravity-based climate convergences
  and 960,000 reflected spectra. Radius and phase are spectrum-only axes. The
  unsupported 100x solar metallicity plus 2x solar C/O pair is omitted because
  PICASO 4 lacks sonora_2121grid_feh2.0_co1.10.hdf5. Planet mass is derived per
  spectrum from g and radius and is not a climate axis. Tint is fixed at 50 K;
  equilibrium temperature is calculated separately.

code:
  spectrum: "PICASO"
  climate: "PICASO"
  cloud: "PICASO/VIRGA if available"
  grid_runner: "aurora_grid"

picaso_tint_mode: "fixed"
picaso_tint_fixed_k: 50.0
picaso_tint_floor_k: 100.0
climate_spectrum_axes: [planet_radius_rearth, phase_deg]
climate_reference_radius_rearth: 2.0
virga_condensates: "H2O,CH4,NH3"

netcdf:
  optional_variables: []
  strict_optional: false
  wavelength_grid:
    mode: constant_resolution
    min_um: 0.3
    max_um: 2.5
    resolution: 15000

stars:
  - teff_k: 3500
    radius_rsun: 0.45
  - teff_k: 4000
    radius_rsun: 0.63
  - teff_k: 5000
    radius_rsun: 0.80
  - teff_k: 6000
    radius_rsun: 1.00
  - teff_k: 7000
    radius_rsun: 1.70

planet_radius_rearth: [1.6, 2.0, 2.5, 3.0]
gravity_ms2: [5, 10, 15, 25, 30]
metallicity_xsolar: [1, 10, 100]
c_to_o_xsolar: [0.5, 1.0, 2.0]
# Omitted before manifest indices are assigned: PICASO 4 has no matching CK table.
unsupported_chemistry_pairs:
  - metallicity_xsolar: 100
    c_to_o_xsolar: 2.0
kzz_cm2_s: [1.0e9, 1.0e11]
cloud_fraction: [0.0, 0.5, 0.75, 0.9, 1.0]
fsed: [0.3, 1, 3, 6, 8]
insolation_searth: [0.35, 0.7, 1.0, 1.5]
phase_deg: [0, 30, 60, 90, 120, 150]

output_root: "roadrunner_egp/aurora_subneptune_grid/outputs/aurora_subneptune_v1"
